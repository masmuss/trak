name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trak_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - run: pnpm prettier --check .

      - run: pnpm lint

      - run: pnpm check

      - run: pnpm test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trak_test
          BETTER_AUTH_SECRET: ci-secret-do-not-use-in-production

      - name: Set up environment
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET" >> .env
          mkdir -p apps/web/.svelte-kit
          echo "DATABASE_URL=$DATABASE_URL" > apps/web/.svelte-kit/.env
          echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET" >> apps/web/.svelte-kit/.env
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trak_test
          BETTER_AUTH_SECRET: ci-secret-do-not-use-in-production

      - run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trak_test
          BETTER_AUTH_SECRET: ci-secret-do-not-use-in-production

  release:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trak_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Set up environment
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env
          echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET" >> .env
          mkdir -p apps/web/.svelte-kit
          echo "DATABASE_URL=$DATABASE_URL" > apps/web/.svelte-kit/.env
          echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET" >> apps/web/.svelte-kit/.env
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trak_test
          BETTER_AUTH_SECRET: ci-secret-do-not-use-in-production

      - run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trak_test
          BETTER_AUTH_SECRET: ci-secret-do-not-use-in-production

      - run: pnpm semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
